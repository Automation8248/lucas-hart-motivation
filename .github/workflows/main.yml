name: Auto Generate Motivation Video

on:
  # Manual button se run karne ke liye
  workflow_dispatch: 
  
  # Automation timer (Har 12 ghante me ek baar chalega. Aap ise change kar sakte hain)
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write # Ye permission bohot zaroori hai history file push karne ke liye

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pura history fetch karega taaki push error na aaye

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests moviepy pillow

      - name: Run Automation Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python video_script.py

      - name: Save and Push Video History
        run: |
          # GitHub bot ko configure karein
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Nayi history file ko add karein
          git add cooling_history.json
          
          # Agar history me koi change hua hai, toh usko commit aur push karein
          # '[skip ci]' likhne se actions loop me nahi fasega
          git diff --staged --quiet || git commit -m "Update cooling history [skip ci]"
          git push
